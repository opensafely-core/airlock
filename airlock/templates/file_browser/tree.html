{% for child in path.children %}
  <li class="tree ">
    {% if child.is_directory %}
      <details class="group" {% if child.expanded %}open{% endif %}>
        <summary>
          <span class="material-symbols-sharp text-sm text-slate-600 tree__folder--open">folder_open</span>
          <span class="material-symbols-sharp text-sm text-slate-600 tree__folder--closed">folder</span>
          <a class="{{ child.html_classes }}" href="{{ child.url }}">{{ child.display }}</a>
        </summary>
        {% if child.children %}
          <ul class="tree">
            {% include "file_browser/tree.html" with path=child %}
          </ul>
        {% endif %}
      </details>
    {% else %}
      <a class="{{ child.html_classes }}" href="{{ child.url }}">{{ child.display }}</a>
    {% endif %}
  </li>
{% endfor %}
